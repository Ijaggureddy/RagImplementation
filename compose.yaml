services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=insert-db-name-here'
      - 'POSTGRES_PASSWORD=insert-password-here'
      - 'POSTGRES_USER=insert-user-here'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'
    volumes:
        - pgvector-data:/var/lib/postgresql/data   # persist embeddings across `docker compose down`

volumes:
  pgvector-data: